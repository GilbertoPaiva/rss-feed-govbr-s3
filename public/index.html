<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Feed Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 2rem;
            padding-bottom: 2rem;
            background-color: #f8f9fa;
        }
        .feed-item {
            margin-bottom: 1.5rem;
            border-left: 3px solid #0d6efd;
            padding-left: 1rem;
        }
        .feed-date {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .feed-snippet {
            margin-top: 0.5rem;
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="pb-3 mb-4 border-bottom">
            <h1 class="display-5 fw-bold">RSS Feed Reader</h1>
        </header>

        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Buscar Feed RSS</h5>
                        <form id="fetch-form" class="row g-3">
                            <div class="col-md-8">
                                <input type="url" class="form-control" id="rss-url" placeholder="URL do feed RSS" required>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-primary w-100">Buscar e Salvar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Carregar Feed Salvo</h5>
                        <form id="load-form" class="row g-3">
                            <div class="col-md-8">
                                <input type="text" class="form-control" id="feed-id" placeholder="ID do Feed" required>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-secondary w-100">Carregar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="feed-info" class="mb-4" style="display: none;">
            <div class="card">
                <div class="card-body">
                    <h2 id="feed-title" class="card-title"></h2>
                    <p id="feed-description" class="card-text"></p>
                    <a id="feed-link" href="#" class="btn btn-sm btn-outline-primary" target="_blank">Visitar Site Original</a>
                </div>
            </div>
        </div>

        <div id="feed-container">
            <p class="text-center text-muted">Nenhum feed carregado. Insira uma URL de feed RSS para começar.</p>
        </div>

        <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="errorModalLabel">Erro</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="error-message">
                        
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const fetchForm = document.getElementById('fetch-form');
            const loadForm = document.getElementById('load-form');
            const feedContainer = document.getElementById('feed-container');
            const feedInfo = document.getElementById('feed-info');
            const feedTitle = document.getElementById('feed-title');
            const feedDescription = document.getElementById('feed-description');
            const feedLink = document.getElementById('feed-link');
            const errorModal = new bootstrap.Modal(document.getElementById('errorModal'));
            const errorMessage = document.getElementById('error-message');

            fetchForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const url = document.getElementById('rss-url').value;
                
                try {
                    const response = await fetch('/api/feeds', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ url }),
                    });

                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Erro ao buscar o feed');
                    }
                    
                    document.getElementById('feed-id').value = data.feedId;
                    loadForm.dispatchEvent(new Event('submit'));
                    
                } catch (error) {
                    showError(error.message);
                }
            });

            loadForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const feedId = document.getElementById('feed-id').value;
                
                try {
                    const response = await fetch(`/api/feed/${feedId}`);
                    const feedData = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(feedData.error || 'Erro ao carregar o feed');
                    }
                    
                    displayFeed(feedData);
                } catch (error) {
                    showError(error.message);
                }
            });

            function displayFeed(feed) {
                feedTitle.textContent = feed.title;
                feedDescription.textContent = feed.description;
                feedLink.href = feed.link;
                feedInfo.style.display = 'block';
                
                let html = '';
                
                if (feed.items && feed.items.length > 0) {
                    feed.items.forEach(item => {
                        html += `
                            <div class="feed-item">
                                <h3><a href="${item.link}" target="_blank">${item.title}</a></h3>
                                <div class="feed-date">${formatDate(item.pubDate)}</div>
                                <div class="feed-snippet">${item.contentSnippet || ''}</div>
                            </div>
                        `;
                    });
                } else {
                    html = '<p class="text-center text-muted">Nenhum item encontrado neste feed.</p>';
                }
                
                feedContainer.innerHTML = html;
            }

            function formatDate(dateStr) {
                if (!dateStr) return '';
                const date = new Date(dateStr);
                return date.toLocaleDateString('pt-BR', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            function showError(message) {
                errorMessage.textContent = message;
                errorModal.show();
            }
        });
    </script>
</body>
</html>
